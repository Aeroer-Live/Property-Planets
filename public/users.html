<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Management – Property Planets</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="app-header">
    <a href="/dashboard.html" class="header-brand">
      <span class="header-brand-icon">P</span>
      Property Planets
    </a>
    <nav class="header-nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/pending.html">Pending</a>
      <a href="/users.html" class="active">Users</a>
      <a href="/properties.html">Properties</a>
    </nav>
    <div class="header-actions">
      <div class="header-actions-tools">
        <button type="button" class="theme-btn" id="themeBtn" aria-label="Toggle theme"></button>
        <button type="button" class="logout-btn logout-btn--emphasis" id="logoutBtn">Logout</button>
      </div>
    </div>
  </header>
  <main class="container">
    <div class="card">
      <h2>User Management</h2>
      <div id="alert"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Username</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Theme</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
  <script type="module">
    import { api } from '/js/api.js';
    import { loadUser, requireAuth, requireAdmin, setTheme, applyStoredTheme } from '/js/auth.js';
    if (!requireAuth()) throw new Error('redirect');
    await loadUser();
    if (!requireAdmin()) throw new Error('redirect');
    applyStoredTheme();
    document.getElementById('themeBtn').textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark';
    document.getElementById('themeBtn').onclick = async () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      await setTheme(next);
      document.getElementById('themeBtn').textContent = next === 'dark' ? 'Light' : 'Dark';
    };
    document.getElementById('logoutBtn').onclick = () => import('/js/auth.js').then(m => m.logout());

    const tbody = document.getElementById('tbody');
    const alertEl = document.getElementById('alert');
    const me = await api('/api/users/me');

    const { users } = await api('/api/users');
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>${escapeHtml(u.username)}</td>
        <td>${escapeHtml(u.first_name + ' ' + u.last_name)}</td>
        <td>${escapeHtml(u.email)}</td>
        <td>${escapeHtml(u.role)}</td>
        <td>${escapeHtml(u.status)}</td>
        <td>${escapeHtml(u.theme_preference)}</td>
        <td>${escapeHtml(u.created_at)}</td>
        <td>
          ${u.id !== me.id ? `<button type="button" class="btn btn-danger btn-sm" data-id="${u.id}">Delete</button>` : ''}
        </td>
      </tr>
    `).join('');
    tbody.querySelectorAll('button[data-id]').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Delete this user?')) return;
        try {
          await api(`/api/users/${btn.dataset.id}`, { method: 'DELETE' });
          btn.closest('tr').remove();
          alertEl.innerHTML = '<div class="alert alert-success">User deleted.</div>';
          setTimeout(() => { alertEl.innerHTML = ''; }, 2000);
        } catch (e) {
          alertEl.innerHTML = `<div class="alert alert-error">${e.message}</div>`;
        }
      };
    });
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-brand">Property <span>Planets</span></div>
      <div class="footer-links">
        <strong style="color: var(--text); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">App</strong>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/properties.html">Properties</a>
        <a href="/pending.html">Pending</a>
        <a href="/users.html">Users</a>
      </div>
      <div class="footer-links">
        <strong style="color: var(--text); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Account</strong>
        <a href="/login.html">Login</a>
        <a href="/register.html">Register</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span class="footer-copyright">© 2025 Property Planets. Property Rent Database.</span>
    </div>
    <div class="footer-trust">
      <span>☁️ Cloudflare</span>
      <span>🔒 Secure</span>
      <span>📊 Property Database</span>
    </div>
  </footer>
</body>
</html>
