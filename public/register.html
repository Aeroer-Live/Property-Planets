<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Registration – Property Planets</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="app-header header-minimal">
    <a href="/login.html" class="header-brand">
      <span class="header-brand-icon">P</span>
      Property Planets
    </a>
    <nav class="header-nav">
      <a href="/login.html">Login</a>
      <a href="/setup.html">Setup</a>
    </nav>
  </header>
  <main class="auth-page">
    <div class="container" style="max-width: 480px;">
      <div class="auth-hero">
        <span class="auth-label">Join the team</span>
        <h1 class="auth-title">Staff Registration</h1>
        <p class="auth-tagline">Register for a staff account. An admin will approve your request before you can sign in.</p>
      </div>
      <div class="auth-card">
        <div id="alert"></div>
        <form id="regForm">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="Choose a username">
          <div class="form-row">
            <div class="form-group">
              <label for="first_name">First Name</label>
              <input type="text" id="first_name" name="first_name" required placeholder="First name">
            </div>
            <div class="form-group">
              <label for="last_name">Last Name</label>
              <input type="text" id="last_name" name="last_name" required placeholder="Last name">
            </div>
          </div>
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" required placeholder="e.g. +60 12 345 6789">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" placeholder="Re-enter password">
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Submit Registration →</button>
          </div>
        </form>
        <div class="auth-links">
          <a href="/login.html">← Back to login</a>
        </div>
      </div>
    </div>
  </main>
  <script type="module">
    const form = document.getElementById('regForm');
    const alertEl = document.getElementById('alert');
    function showError(msg) {
      alertEl.innerHTML = `<div class="alert alert-error">${msg}</div>`;
    }
    function showSuccess(msg) {
      alertEl.innerHTML = `<div class="alert alert-success">${msg}</div>`;
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (form.password.value !== form.confirm_password.value) {
        showError('Password and confirmation do not match');
        return;
      }
      alertEl.innerHTML = '';
      try {
        const { register } = await import('/js/auth.js');
        await register({
          username: form.username.value.trim(),
          first_name: form.first_name.value.trim(),
          last_name: form.last_name.value.trim(),
          phone: form.phone.value.trim(),
          email: form.email.value.trim(),
          password: form.password.value,
          confirm_password: form.confirm_password.value,
        });
        showSuccess('Registration submitted. Please wait for admin approval.');
        form.reset();
      } catch (err) {
        showError(err.message || 'Registration failed');
      }
    });
  </script>
  </main>
  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-brand">Property <span>Planets</span></div>
      <div class="footer-links">
        <a href="/login.html">Login</a>
        <a href="/register.html">Register</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span class="footer-copyright">© 2025 Property Planets. Property Rent Database.</span>
    </div>
    <div class="footer-trust">
      <span>☁️ Cloudflare</span>
      <span>🔒 Secure</span>
    </div>
  </footer>
</body>
</html>
